name: Docker Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  docker-smoke-test:
    name: Docker image smoke test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: toolcrate:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: toolcrate --help
        run: docker run --rm toolcrate:ci uv run toolcrate --help

      - name: toolcrate --version
        run: docker run --rm toolcrate:ci uv run toolcrate --version

      - name: Package imports cleanly
        run: |
          docker run --rm toolcrate:ci uv run python -c "
          import toolcrate
          import toolcrate.cli.main
          import toolcrate.cli.wrappers
          import toolcrate.cli.binary_manager
          print('All imports OK')
          "

      - name: docker-compose config is valid
        run: docker compose config --quiet
