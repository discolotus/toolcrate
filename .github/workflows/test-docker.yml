name: Docker Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test-docker:
    name: Docker Tests (${{ matrix.test-type }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        test-type: [unit, integration, quick]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build test image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: toolcrate:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run ${{ matrix.test-type }} tests
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            --entrypoint "" \
            toolcrate:test \
            uv run pytest tests/ -v -m "${{ matrix.test-type }}" --tb=short
