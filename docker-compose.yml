version: '3.8'

services:
  toolcrate:
    build:
      context: .
      dockerfile: Dockerfile
    image: toolcrate:latest
    container_name: toolcrate-app
    restart: unless-stopped
    environment:
      - PYTHONPATH=/app/src
      - PYTHONUNBUFFERED=1
    working_dir: /app
    networks:
      - toolcrate-network
    volumes:
      - toolcrate-data:/app/data
      - toolcrate-logs:/app/logs
      - toolcrate-config:/app/config
    command: ["tail", "-f", "/dev/null"]

networks:
  toolcrate-network:
    driver: bridge

volumes:
  toolcrate-data:
    driver: local
  toolcrate-logs:
    driver: local
  toolcrate-config:
    driver: local
